services:
  concert-tracker-db:
    image: postgres:16
    container_name: concert-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: concert_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  concert-tracker-api:
    container_name: concert-tracker-api
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@concert-tracker-db:5432/concert_tracker
    depends_on:
      concert-tracker-db:
        condition: service_healthy

volumes:
  postgres_data:
